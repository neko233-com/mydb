# MyDB Configuration
# This file is used by mydb-server

server:
  # 监听地址
  host: "0.0.0.0"
  # 监听端口（默认 3306，与 MySQL 相同）
  port: 3306
  # 最大连接数
  max_connections: 1000
  # 工作线程数（0 = 自动检测 CPU 核心数）
  thread_count: 0
  # 连接超时（秒）
  connect_timeout: 10
  # 交互超时（秒）
  interactive_timeout: 28800

http:
  # HTTP 管理 API 端口
  port: 4306
  # 监听地址（仅内网）
  host: "127.0.0.1"
  # 管理员用户名
  admin_username: "root"
  # 管理员密码
  admin_password: "root"
  # 是否启用 HTTP API
  enabled: true

storage:
  # 数据目录
  data_dir: "/var/lib/mydb"
  # 内部存储引擎；MySQL 协议侧 ENGINE=InnoDB 是兼容别名
  engine: "neko233"
  # Buffer Pool 大小
  buffer_pool_size: "800M"
  # 日志文件大小
  log_file_size: "256M"
  # 页大小
  page_size: 16384
  # 吞吐默认收集窗口（微秒；0 = 低延迟自然批量）
  group_commit_window_us: 250

memory:
  # 内存上限
  max_memory: "1G"
  # 查询缓存
  query_cache_size: "64M"
  # 排序缓冲
  sort_buffer_size: "4M"

security:
  # MySQL 协议默认用户名
  default_username: "root"
  # MySQL 协议默认密码
  default_password: "root"
  # 认证方式
  authentication: "mysql_native_password"
  # 是否要求安全传输
  require_secure_transport: false
  # MySQL STARTTLS PEM 证书和私钥；两项同时设置后服务广告 CLIENT_SSL
  tls_cert: null
  tls_key: null
  # 密码过期时间（天，0 = 不过期）
  password_lifetime: 0
  # 生产环境设为 true：两个管理员 secret 至少 20 bytes、不得相同或使用占位值
  enforce_strong_passwords: false
  # 允许客户端显式使用 LOAD DATA LOCAL INFILE
  local_infile: true
  # 非 LOCAL 文件仅允许来自此目录；空值时使用 data_dir/imports
  secure_file_priv: null
  # 单次 LOAD DATA 最大字节数（默认 1 GiB）
  max_load_data_size: 1073741824

backup:
  # 备份目录
  backup_dir: "/var/lib/mydb/backups"
  # 自动备份间隔（小时，0 = 不自动备份）
  auto_backup_interval: 0
  # 保留备份数量
  max_backups: 10

logging:
  # 日志级别: trace, debug, info, warn, error
  level: "info"
  # 日志文件路径（空 = 标准输出）
  file: ""
  # 日志轮转大小
  max_size: "100M"
  # 保留日志文件数
  max_files: 10

character_set:
  # 服务器字符集
  server: "utf8mb4"
  # 连接字符集
  connection: "utf8mb4"
  # 结果字符集
  results: "utf8mb4"

agent:
  # 内置 Agent HTTP 诊断，默认开启
  enabled: true
  # 慢 SQL 阈值（毫秒）
  slow_query_threshold_ms: 100
  # 内存中保留最近慢 SQL 数量
  max_slow_queries: 1024
