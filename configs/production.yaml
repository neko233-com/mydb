# MyDB production baseline. Secrets come only from the deployment environment:
# MYDB_ROOT_PASSWORD_FILE and MYDB_ADMIN_PASSWORD_FILE are preferred.
# Native MySQL STARTTLS uses these PEM paths. For mutual TLS and external
# policy enforcement, keep a TLS proxy in front of the loopback listener.

server:
  host: "127.0.0.1"
  port: 3306
  max_connections: 512
  thread_count: 0
  connect_timeout: 10
  interactive_timeout: 28800

http:
  host: "127.0.0.1"
  port: 4306
  admin_username: "admin"
  admin_password: "CHANGE_ME_USE_MYDB_ADMIN_PASSWORD_FILE"
  enabled: true

storage:
  data_dir: "/var/lib/mydb/data"
  engine: "neko233"
  buffer_pool_size: "1G"
  log_file_size: "256M"
  page_size: 16384
  group_commit_window_us: 0

memory:
  max_memory: "2G"
  query_cache_size: "0"
  sort_buffer_size: "4M"

security:
  default_username: "root"
  default_password: "CHANGE_ME_USE_MYDB_ROOT_PASSWORD_FILE"
  authentication: "mysql_native_password"
  require_secure_transport: true
  tls_cert: "/etc/mydb/tls/server.crt"
  tls_key: "/etc/mydb/tls/server.key"
  password_lifetime: 0
  enforce_strong_passwords: true
  local_infile: false
  secure_file_priv: "/var/lib/mydb/imports"
  max_load_data_size: 1073741824

backup:
  backup_dir: "/var/lib/mydb/backups"
  auto_backup_interval: 0
  max_backups: 14

logging:
  level: "info"
  file: ""
  max_size: "100M"
  max_files: 14

character_set:
  server: "utf8mb4"
  connection: "utf8mb4"
  results: "utf8mb4"

agent:
  enabled: true
  slow_query_threshold_ms: 100
  max_slow_queries: 4096
